name: episode_guide
description: An Episode Guide app to keep track of your favorite shows.

version: 1.0.0+1

environment:
  sdk: "^3.8.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  json_annotation: ^4.11.0
  cached_network_image: ^3.4.1
  graphql_flutter: ^5.1.2
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
  - assets/images/

  fonts:
  - family: AlegreyaSans
    fonts:
    - asset: assets/fonts/AlegreyaSans-Regular.ttf
    - asset: assets/fonts/AlegreyaSans-Italic.ttf
      style: italic
    - asset: assets/fonts/AlegreyaSans-Bold.ttf
      weight: 700
